name: Build release
on:
  workflow_dispatch:
  push:
    tags: ['v*']
permissions: { contents: write }
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python -m pip install -e ".[ui,dev]" pyinstaller
      - run: ./scripts/build.ps1
      - shell: pwsh
        run: |
          Compress-Archive dist/BananaForgeLauncher BananaForgeLauncher.zip
          $sha=(Get-FileHash BananaForgeLauncher.zip -Algorithm SHA256).Hash.ToLower()
          @{schema_version=1;version='${{ github.ref_name }}';minimum_bootstrap_version='0.1.0';platform='windows';architecture='x86_64';download_url='https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/BananaForgeLauncher.zip';sha256=$sha;signature_url=$null;size=(Get-Item BananaForgeLauncher.zip).Length} | ConvertTo-Json | Set-Content release-manifest.json
      - uses: softprops/action-gh-release@v2
        with: { draft: true, files: 'BananaForgeLauncher.zip,release-manifest.json' }
