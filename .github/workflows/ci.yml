name: CI
on: [push, pull_request]
jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy launcher bootstrap
      - run: pytest
